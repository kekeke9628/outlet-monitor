name: 경쟁사 현황 수집 및 배포

# 언제 실행할지
on:
  schedule:
    - cron: "10 21 * * *"     # 매일 06:10 KST (UTC 기준 전일 21:10)
  workflow_dispatch:           # Actions 탭에서 수동 실행 버튼
  push:
    branches: [ main ]         # 파일을 바꿔 올리면 즉시 반영

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 수집 실행 + 사이트 폴더 구성
        # 최상위의 index.html / instagram_input.html 을 _site 로 모으고 data.json 생성
        # 일부 소스가 잠깐 실패해도 배포는 계속 진행(대시보드 '수집 상태'에 표시됨)
        run: |
          mkdir -p _site
          cp index.html instagram_input.html _site/
          python collector.py --out _site/data.json || true

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 사이트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 배포
        id: deploy
        uses: actions/deploy-pages@v4
