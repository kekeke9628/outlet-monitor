<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>경쟁사 현황 · 주간 모니터링</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root{
    --bg:#0E1013; --bg-elev:#14161C; --surface:#191C23; --surface-2:#1F232B;
    --line:#282C36; --line-soft:#22262E;
    --tx:#E9ECF1; --tx-2:#9AA1AD; --tx-mut:#666D7A;
    --accent:#3DD9B0;               /* UI: active / focus / new */
    --sse:#E7BC63;                  /* 신세계(우리) 골드 */
    --sse-tint:rgba(231,188,99,.10);
    --hyundai:#7FA0CC;              /* 현대 */
    --lotte:#DE6C7E;                /* 롯데 */
    --danger:#E9736B;
    --r:16px; --r-sm:11px;
    --mono:ui-monospace,"SF Mono",Menlo,"Roboto Mono",monospace;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;} *{transition:none!important;animation:none!important;}}
  body{
    background:var(--bg);color:var(--tx);font-family:var(--font);
    font-size:15px;line-height:1.5;letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom);
  }
  .shell{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}

  /* ---------- header + filters (sticky) ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(14,16,19,.86);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);}
  #app-header{display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:14px 18px 10px;}
  .brand-mark{display:flex;align-items:center;gap:9px;}
  .brand-mark .glyph{width:9px;height:22px;border-radius:3px;
    background:linear-gradient(var(--sse),#c99b3e);box-shadow:0 0 12px rgba(231,188,99,.35);}
  #app-header h1{font-size:15.5px;font-weight:700;letter-spacing:-.02em;}
  #app-header .sub{font-size:11px;color:var(--tx-mut);font-weight:500;margin-top:1px;}
  .crawl-time{text-align:right;font-size:10.5px;color:var(--tx-2);line-height:1.35;}
  .crawl-time b{display:block;color:var(--tx);font-family:var(--mono);font-size:11px;font-weight:600;}
  .crawl-time .dot{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);margin-right:4px;box-shadow:0 0 6px var(--accent);vertical-align:1px;}

  .chiprow{display:flex;gap:7px;overflow-x:auto;padding:4px 18px 12px;
    scrollbar-width:none;}
  .chiprow::-webkit-scrollbar{display:none;}
  #period-filter{border-top:1px solid var(--line-soft);padding-top:11px;}
  #period-filter .lbl{flex:0 0 auto;align-self:center;font-size:10.5px;
    color:var(--tx-mut);font-weight:600;padding-right:2px;letter-spacing:0;}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--bg-elev);
    color:var(--tx-2);font-family:inherit;font-size:12.5px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:all .16s ease;min-height:34px;}
  .chip:hover{border-color:#3a3f4a;color:var(--tx);}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);
    color:#08130F;box-shadow:0 2px 14px rgba(61,217,176,.28);}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  #category-nav .chip[data-active="true"]{border-color:var(--sse);color:var(--sse);}

  .customrange{display:none;gap:8px;align-items:center;padding:0 18px 12px;flex-wrap:wrap;}
  .customrange.on{display:flex;}
  .customrange input[type=date]{background:var(--bg-elev);border:1px solid var(--line);
    color:var(--tx);font-family:var(--mono);font-size:12.5px;padding:8px 10px;
    border-radius:10px;color-scheme:dark;flex:1 1 130px;min-height:38px;}
  .customrange span{color:var(--tx-mut);font-size:12px;}

  /* ---------- overview scoreboard ---------- */
  section{scroll-margin-top:150px;}
  #overview{padding:16px 16px 6px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;
    color:var(--tx-mut);text-transform:uppercase;margin-bottom:11px;display:flex;
    align-items:center;gap:8px;}
  .eyebrow .rng{color:var(--accent);letter-spacing:.02em;font-family:var(--mono);
    text-transform:none;font-weight:600;}
  .board{background:var(--surface);border:1px solid var(--line-soft);
    border-radius:var(--r);padding:6px 4px;}
  .board-row{display:grid;grid-template-columns:96px 1fr auto;align-items:center;
    gap:10px;padding:12px 14px;border-bottom:1px solid var(--line-soft);}
  .board-row:last-child{border-bottom:none;}
  .b-name{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;}
  .b-name .idot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .b-name.sse{color:var(--sse);} .b-name.sse .idot{background:var(--sse);box-shadow:0 0 8px rgba(231,188,99,.4);}
  .b-name.hyundai .idot{background:var(--hyundai);} .b-name.lotte .idot{background:var(--lotte);}
  .b-name .tag{font-size:9px;font-weight:800;color:#0d0f13;background:var(--sse);
    padding:1px 5px;border-radius:4px;letter-spacing:.02em;}
  .bars{display:flex;gap:3px;height:26px;align-items:flex-end;}
  .bars i{flex:1;background:var(--surface-2);border-radius:2px 2px 0 0;min-height:3px;
    transition:height .4s cubic-bezier(.2,.7,.3,1);}
  .board-row.sse .bars i{background:linear-gradient(var(--sse),#8f6f28);}
  .board-row.hyundai .bars i{background:var(--hyundai);opacity:.85;}
  .board-row.lotte .bars i{background:var(--lotte);opacity:.85;}
  .b-total{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1;
    text-align:right;min-width:42px;}
  .b-total small{display:block;font-size:9.5px;color:var(--tx-mut);font-weight:600;
    font-family:var(--font);margin-top:3px;letter-spacing:.02em;}
  .b-total .nw{color:var(--accent);}

  /* ---------- category sections ---------- */
  .cat{padding:18px 16px 4px;}
  .cat-head{display:flex;align-items:baseline;justify-content:space-between;
    gap:10px;margin-bottom:12px;}
  .cat-head .t{display:flex;align-items:center;gap:9px;}
  .cat-head h2{font-size:16px;font-weight:800;letter-spacing:-.02em;}
  .cat-head .no{font-family:var(--mono);font-size:11px;color:var(--tx-mut);font-weight:700;}
  .badge-semi{font-size:9.5px;font-weight:800;color:var(--accent);
    border:1px solid rgba(61,217,176,.4);background:rgba(61,217,176,.08);
    padding:2px 7px;border-radius:6px;letter-spacing:.02em;}
  .cnt-mini{display:flex;gap:9px;align-items:center;font-family:var(--mono);
    font-size:12px;font-weight:700;}
  .cnt-mini span{display:inline-flex;align-items:center;gap:4px;color:var(--tx-2);}
  .cnt-mini .d{width:7px;height:7px;border-radius:50%;}
  .cnt-mini .d.sse{background:var(--sse);} .cnt-mini .d.hy{background:var(--hyundai);}
  .cnt-mini .d.lo{background:var(--lotte);}

  .brandblock{background:var(--surface);border:1px solid var(--line-soft);
    border-left:3px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;}
  .brandblock.sse{border-left-color:var(--sse);background:
    linear-gradient(var(--sse-tint),var(--sse-tint)),var(--surface);}
  .brandblock.hyundai{border-left-color:var(--hyundai);}
  .brandblock.lotte{border-left-color:var(--lotte);}
  .bb-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
  .bb-name{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--tx);}
  .bb-name .idot{width:8px;height:8px;border-radius:50%;}
  .brandblock.sse .bb-name{color:var(--sse);} .brandblock.sse .idot{background:var(--sse);}
  .brandblock.hyundai .idot{background:var(--hyundai);}
  .brandblock.lotte .idot{background:var(--lotte);}
  .bb-name .me{font-size:8.5px;font-weight:800;color:#0d0f13;background:var(--sse);
    padding:1px 5px;border-radius:4px;}
  .bb-count{font-family:var(--mono);font-size:11.5px;color:var(--tx-mut);font-weight:700;}
  .item{padding:9px 0 3px;border-top:1px solid var(--line-soft);margin-top:8px;}
  .item:first-of-type{border-top:none;margin-top:4px;}
  .item .h{display:flex;align-items:flex-start;gap:7px;}
  .item .ttl{font-size:13.5px;font-weight:600;color:var(--tx);line-height:1.4;flex:1;}
  .item .ttl a{color:inherit;text-decoration:none;border-bottom:1px solid transparent;}
  .item .ttl a:hover{border-bottom-color:var(--tx-2);}
  .newpill{flex:0 0 auto;font-size:9px;font-weight:800;color:#08130F;
    background:var(--accent);padding:1px 6px;border-radius:5px;margin-top:2px;}
  .meta{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:5px;font-size:11px;
    color:var(--tx-mut);font-weight:500;}
  .meta .typ{color:var(--tx-2);border:1px solid var(--line);border-radius:5px;
    padding:0 6px;font-weight:600;}
  .meta .dt{font-family:var(--mono);}
  .meta .srclink{margin-left:auto;color:var(--accent);text-decoration:none;
    font-weight:700;font-size:10.5px;border:1px solid rgba(61,217,176,.35);
    border-radius:6px;padding:1px 7px;transition:.15s;}
  .meta .srclink:hover{background:rgba(61,217,176,.1);}
  .meta .srclink:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .empty{color:var(--tx-mut);font-size:12px;font-style:normal;padding:6px 0 2px;
    display:flex;align-items:center;gap:7px;}
  .empty::before{content:"";width:14px;height:1px;background:var(--tx-mut);opacity:.6;}
  .brandblock.dim{opacity:.5;}

  .more{margin:2px 0 4px;}
  .more button{width:100%;background:transparent;border:1px dashed var(--line);
    color:var(--tx-2);font-family:inherit;font-size:12px;font-weight:600;
    padding:9px;border-radius:10px;cursor:pointer;transition:.15s;min-height:38px;}
  .more button:hover{border-color:#3a3f4a;color:var(--tx);}
  .more button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .collapsed .item.extra{display:none;}

  #crawl-status{margin:20px 16px 0;background:var(--bg-elev);
    border:1px solid var(--line-soft);border-radius:var(--r);padding:14px 16px;}
  #crawl-status .eyebrow{margin-bottom:12px;}
  .src{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;border-top:1px solid var(--line-soft);font-size:12.5px;}
  .src:first-of-type{border-top:none;}
  .src .n{color:var(--tx-2);font-weight:600;}
  .src .st{display:flex;align-items:center;gap:6px;font-family:var(--mono);
    font-size:11px;font-weight:700;}
  .src .st .p{width:7px;height:7px;border-radius:50%;}

  .st.semi{color:var(--sse);} .st.semi .p{background:var(--sse);}
  .st.err{color:var(--danger);} .st.err .p{background:var(--danger);box-shadow:0 0 6px var(--danger);}

  #app-footer b{color:var(--tx-2);}

    font-weight:600;line-height:1.45;border:1px solid;}
  .databanner.sample{background:rgba(231,188,99,.09);border-color:rgba(231,188,99,.4);color:var(--sse);}
  .databanner.err{background:rgba(233,115,107,.09);border-color:rgba(233,115,107,.4);color:var(--danger);}
  .mock-note{margin:14px 16px 0;font-size:10px;color:var(--tx-mut);text-align:center;

</head>

  <div id="cats"></div>

  <section id="crawl-status">
    <div class="eyebrow">수집 상태</div>
    <div id="src-list"><!-- injected from payload.sources --></div>
  </section>

  <div class="mock-note">※ 대시보드는 크롤러가 생성한 <b>data.json</b> 만 읽습니다. 각 항목의 <b>출처 ↗</b> 링크는 수집된 원문 URL로 연결됩니다(뉴스는 제목 기반 네이버 뉴스 검색).</div>

  <footer id="app-footer">
    <b>데이터 출처</b> · 각 사 공식 홈페이지 · 네이버 뉴스 · 유튜브 공식 채널 · 한국관광 데이터랩 · 인스타그램(반자동 입력)<br>
    수집 항목은 제목·기간·링크 등 공개 사실 정보에 한하며, 원문은 각 출처로 연결됩니다.
  </footer>
</div>

let PAYLOAD=null;
const TODAY=new Date(); TODAY.setHours(0,0,0,0);   /* 오늘 기준(기간 필터) */
const D=s=>new Date(s+"T00:00:00");
const fmt=dt=>`${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`;
const fmtTime=iso=>{const d=new Date(iso);return `${fmt(d)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};

/* ---------- period ---------- */
let range=computeRange("7");
function computeRange(p){let to=new Date(TODAY),from=new Date(TODAY);
  if(p==="7")from.setDate(to.getDate()-6);
  else if(p==="14")from.setDate(to.getDate()-13);
  else if(p==="month")from=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  return {from,to,p};}
function inRange(a,mode){
  if(mode==="event"){const d=D(a.date);return d>=range.from&&d<=range.to;}
  const s=D(a.start),e=D(a.end);return s<=range.to&&e>=range.from;}
function catMode(id){return (CATS.find(c=>c.id===id)||{}).mode;}

/* ---------- render ---------- */
function render(){
  if(!PAYLOAD)return;
  document.getElementById("lastCrawl").innerHTML=`<span class="dot"></span>${fmtTime(PAYLOAD.generatedAt)}`;
  document.getElementById("rangeLabel").textContent=`${fmt(range.from)} – ${fmt(range.to)}`;

  const acts=PAYLOAD.activities||[];
  const pick=(cat,brand)=>acts.filter(a=>a.category===cat&&a.brand===brand&&inRange(a,catMode(cat)));
  const totals={},perCat={};
  BRANDS.forEach(b=>totals[b.key]={t:0,n:0});
  CATS.forEach(c=>{perCat[c.id]={};BRANDS.forEach(b=>{
    const it=pick(c.id,b.key);perCat[c.id][b.key]=it;
    totals[b.key].t+=it.length;totals[b.key].n+=it.filter(x=>x.isNew).length;});});

  document.getElementById("board").innerHTML=BRANDS.map(b=>{
    const tt=totals[b.key];
    const bars=CATS.map(c=>{const n=perCat[c.id][b.key].length;
      return `<i style="height:${Math.min(100,n===0?6:14+n*22)}%"></i>`;}).join("");
    return `<div class="board-row ${b.key}">
      <div class="b-name ${b.key}"><span class="idot"></span>${b.label}${b.me?'<span class="tag">우리</span>':''}</div>
      <div class="bars">${bars}</div>
      <div class="b-total">${tt.t}<small>건 ${tt.n?`· <span class="nw">NEW ${tt.n}</span>`:""}</small></div>
    </div>`;}).join("");

  document.getElementById("cats").innerHTML=CATS.map(c=>{
    const mini=BRANDS.map(b=>{const dc=b.key==="sse"?"sse":b.key==="hyundai"?"hy":"lo";
      return `<span><i class="d ${dc}"></i>${perCat[c.id][b.key].length}</span>`;}).join("");
    const blocks=BRANDS.map(b=>{
      const items=perCat[c.id][b.key],empty=items.length===0;
      const rows=items.map((x,i)=>{
        const dateTxt=catMode(c.id)==="event"?fmt(D(x.date)):`${fmt(D(x.start))}–${fmt(D(x.end))}`;
        return `<div class="item ${i>=2?'extra':''}">
          <div class="h"><div class="ttl"><a href="${x.url}" target="_blank" rel="noopener">${x.title}</a></div>
            ${x.isNew?'<span class="newpill">NEW</span>':''}</div>
          <div class="meta"><span class="typ">${x.type}</span><span class="dt">${dateTxt}</span>
            <a class="srclink" href="${x.url}" target="_blank" rel="noopener">${x.source} ↗</a></div>
        </div>`;}).join("");
      const more=items.length>2;
      return `<div class="brandblock ${b.key} ${empty?'dim':''} ${more?'collapsed':''}" data-block>
        <div class="bb-top"><div class="bb-name"><span class="idot"></span>${b.label}${b.me?'<span class="me">우리</span>':''}</div>
          <div class="bb-count">${items.length}건</div></div>
        ${empty?'<div class="empty">이 기간 활동 없음</div>':rows}
        ${more?`<div class="more"><button onclick="toggleMore(this)">+ ${items.length-2}건 더 보기</button></div>`:''}
      </div>`;}).join("");
    return `<section id="${c.id}" class="cat">
      <div class="cat-head"><div class="t"><span class="no">${c.no}</span><h2>${c.name}</h2>
        ${c.semi?'<span class="badge-semi">반자동</span>':''}</div>
        <div class="cnt-mini">${mini}</div></div>
      ${blocks}</section>`;}).join("");

  renderSources();
  observeSections();
}

function renderSources(){
  document.getElementById("src-list").innerHTML=(PAYLOAD.sources||[]).map(s=>{
    const st=SRC_STATUS[s.status]||SRC_STATUS.error;
    return `<div class="src"><span class="n">${s.name}</span>
      <span class="st ${st.c}"><span class="p"></span>${st.t}${s.note?` · ${s.note}`:""}</span></div>`;}).join("");
}

function toggleMore(btn){const block=btn.closest("[data-block]");
  const collapsed=block.classList.toggle("collapsed");
  const extra=block.querySelectorAll(".item.extra").length;
  btn.textContent=collapsed?`+ ${extra}건 더 보기`:"접기";}

/* ---------- controls ---------- */
document.querySelectorAll("#period-filter .chip").forEach(ch=>{
  ch.addEventListener("click",()=>{
    document.querySelectorAll("#period-filter .chip").forEach(c=>c.setAttribute("aria-pressed","false"));
    ch.setAttribute("aria-pressed","true");
    const p=ch.dataset.period,cr=document.getElementById("customrange");
    if(p==="custom"){cr.classList.add("on");
      const f=document.getElementById("dFrom"),t=document.getElementById("dTo");
      if(!f.value){const a=new Date(TODAY);a.setDate(a.getDate()-6);
        f.value=a.toISOString().slice(0,10);t.value=TODAY.toISOString().slice(0,10);}return;}
    cr.classList.remove("on");range=computeRange(p);render();});});
document.getElementById("applyCustom").addEventListener("click",()=>{
  const f=document.getElementById("dFrom").value,t=document.getElementById("dTo").value;
  if(!f||!t)return;range={from:D(f),to:D(t),p:"custom"};render();});

document.querySelectorAll("#category-nav .chip").forEach(ch=>{
  ch.addEventListener("click",()=>{const el=document.getElementById(ch.dataset.go);
    if(el)el.scrollIntoView({behavior:"smooth",block:"start"});});});
const navChips=[...document.querySelectorAll("#category-nav .chip")];
let io=null;
function observeSections(){
  if(io)io.disconnect();
  io=new IntersectionObserver(ents=>{ents.forEach(e=>{if(e.isIntersecting){
    navChips.forEach(c=>c.dataset.active="false");
    const a=navChips.find(c=>c.dataset.go===e.target.id);if(a)a.dataset.active="true";}});},
    {rootMargin:"-45% 0px -50% 0px",threshold:0});
  ["overview",...CATS.map(c=>c.id)].forEach(id=>{const el=document.getElementById(id);if(el)io.observe(el);});
}

/* ---------- load ---------- */
function banner(cls,msg){const b=document.getElementById("databanner");
  b.className="databanner "+cls;b.textContent=msg;b.hidden=false;}
async function load(){
  try{
    const res=await fetch(API_ENDPOINT,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    PAYLOAD=await res.json();render();
  }catch(err){
    if(SAMPLE){PAYLOAD=SAMPLE;render();
      banner("sample",`실시간 데이터(${API_ENDPOINT})를 불러오지 못해 내장 샘플을 표시 중입니다. 서버 연결 시 자동 반영됩니다.`);}
    else banner("err",`데이터를 불러오지 못했습니다: ${err.message}`);
  }
}
load();
</script>
